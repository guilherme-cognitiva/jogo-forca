<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0f0f17;
            --surface:  #16161f;
            --border:   #22222e;
            --text:     #e8e8f4;
            --muted:    #44445a;
            --muted2:   #666680;
            --red:      #e84545;
            --green:    #2db87a;
            --yellow:   #e8a835;
            --purple:   #9b7fe8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===================== TOP BAR ===================== */
        #top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .top-logo {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text);
        }

        #status-bar {
            font-size: 0.7rem;
            color: var(--muted2);
            letter-spacing: 0.5px;
        }

        #opp-topbar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #opp-topbar .opp-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted2);
        }

        #opp-word-top {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--muted2);
            font-family: 'Inter', monospace;
        }

        .opp-lives {
            display: flex;
            gap: 4px;
        }

        .opp-life {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.3s;
        }

        .opp-life.lost { background: var(--red); }

        /* ===================== WAITING ===================== */
        #waiting-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .wait-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 1px;
        }

        .wait-sub {
            font-size: 0.8rem;
            color: var(--muted2);
        }

        .wait-ring {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid var(--border);
            border-top-color: var(--red);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===================== GAME ===================== */
        #game-screen {
            display: none;
            flex: 1;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 480px;
        }

        /* Left: hangman */
        .hangman-side {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            gap: 28px;
        }

        .hangman-svg {
            width: min(300px, 100%);
            height: auto;
        }

        .lives-row {
            display: flex;
            gap: 8px;
        }

        .life-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            border: 1px solid var(--muted);
            transition: background 0.3s, border-color 0.3s;
        }

        .life-dot.lost {
            background: var(--red);
            border-color: var(--red);
        }

        .error-label {
            font-size: 0.7rem;
            color: var(--muted2);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Right: word + keyboard */
        .word-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 28px;
            gap: 32px;
        }

        /* Word display */
        .word-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .letter-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .letter-char {
            width: 38px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.25s, transform 0.25s;
        }

        .letter-char.show {
            opacity: 1;
            transform: translateY(0);
        }

        .letter-line {
            width: 38px;
            height: 2px;
            background: var(--muted);
        }

        /* Hint button */
        .hint-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        #hint-btn {
            padding: 8px 22px;
            background: transparent;
            border: 1px solid var(--yellow);
            border-radius: 6px;
            color: var(--yellow);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

        #hint-btn:hover:not(:disabled) { background: rgba(232,168,53,0.1); }

        #hint-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            border-color: var(--muted);
            color: var(--muted2);
        }

        .hint-sub {
            font-size: 0.65rem;
            color: var(--muted2);
            letter-spacing: 1px;
        }

        /* Keyboard */
        .keyboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 420px;
        }

        .key-row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .key {
            width: 36px;
            height: 42px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.1s, color 0.1s, transform 0.08s, border-color 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key:hover:not(:disabled) {
            background: #22223a;
            transform: translateY(-1px);
        }

        .key:active:not(:disabled) { transform: translateY(0); }

        .key.hit {
            background: rgba(45,184,122,0.15);
            border-color: var(--green);
            color: var(--green);
            cursor: default;
        }

        .key.miss {
            background: transparent;
            border-color: var(--border);
            color: var(--muted);
            cursor: default;
            text-decoration: line-through;
        }

        .key:disabled { cursor: default; }

        /* Opponent badge strip */
        #opp-status-strip {
            display: none;
            padding: 6px 28px;
            font-size: 0.72rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        #opp-status-strip.disconnected { color: var(--yellow); background: rgba(232,168,53,0.06); }
        #opp-status-strip.won          { color: var(--green);  background: rgba(45,184,122,0.06); }
        #opp-status-strip.lost         { color: var(--red);    background: rgba(232,69,69,0.06); }

        /* End overlay */
        #end-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        #end-overlay.show { display: flex; }

        .end-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 52px 44px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            animation: fadeUp 0.35s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #end-result {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        #end-title {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        #end-word {
            font-size: 0.85rem;
            color: var(--muted2);
            margin-bottom: 36px;
            letter-spacing: 1px;
        }

        #play-again-btn {
            padding: 12px 32px;
            background: var(--red);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        #play-again-btn:hover { opacity: 0.85; }

        /* ===================== OPPONENT PANEL ===================== */
        #opp-panel {
            display: none;
            border-top: 1px solid var(--border);
            background: var(--surface);
            padding: 20px 28px 24px;
        }

        .opp-panel-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .opp-panel-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--purple);
        }

        .opp-panel-lives { display: flex; gap: 5px; }

        .opp-panel-life {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid var(--muted);
            background: var(--border);
            transition: background 0.3s, border-color 0.3s;
        }

        .opp-panel-life.lost { background: var(--red); border-color: var(--red); }

        .opp-panel-err {
            font-size: 0.7rem;
            color: var(--muted2);
        }

        .opp-word-row {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .opp-letter-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .opp-letter-char {
            width: 28px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--purple);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .opp-letter-char.show { opacity: 1; }

        .opp-letter-line {
            width: 28px;
            height: 2px;
            background: var(--muted);
        }

        .opp-letters-section {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .opp-letter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .opp-letter-group-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted2);
        }

        .opp-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 24px;
        }

        .opp-chip {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .opp-chip.hit  { background: rgba(45,184,122,0.15); color: var(--green); border: 1px solid rgba(45,184,122,0.3); }
        .opp-chip.miss { background: transparent; color: var(--muted); border: 1px solid var(--border); text-decoration: line-through; }

        /* Responsive */
        @media (max-width: 700px) {
            .game-layout { grid-template-columns: 1fr; }
            .hangman-side {
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 20px;
                gap: 16px;
            }
            .hangman-svg { width: min(200px, 80%); }
            .word-side { padding: 20px 16px; gap: 20px; }
            .key { width: 30px; height: 36px; font-size: 0.72rem; }
            #top-bar { padding: 10px 16px; }
            #opp-topbar { display: none; }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div id="top-bar">
    <span class="top-logo">Jogo da Forca</span>
    <span id="status-bar">Conectando...</span>
    <div id="opp-topbar" style="display:none">
        <span class="opp-label">Oponente</span>
        <div class="opp-lives" id="opp-lives-top"></div>
        <span id="opp-word-top"></span>
    </div>
</div>

<!-- Opponent status strip -->
<div id="opp-status-strip"></div>

<!-- Waiting -->
<div id="waiting-screen">
    <div class="wait-ring"></div>
    <span class="wait-title">Aguardando oponente</span>
    <span class="wait-sub" id="queue-pos">Procurando adversario...</span>
</div>

<!-- Game -->
<div id="game-screen">
    <div class="game-layout">

        <!-- Left: hangman + lives -->
        <div class="hangman-side">
            <svg class="hangman-svg" viewBox="0 0 200 230">
                <!-- Gallows -->
                <line x1="10"  y1="220" x2="190" y2="220" stroke="#1e1e2e" stroke-width="5" stroke-linecap="round"/>
                <line x1="50"  y1="220" x2="50"  y2="10"  stroke="#1e1e2e" stroke-width="5" stroke-linecap="round"/>
                <line x1="50"  y1="10"  x2="140" y2="10"  stroke="#1e1e2e" stroke-width="5" stroke-linecap="round"/>
                <line x1="140" y1="10"  x2="140" y2="40"  stroke="#1e1e2e" stroke-width="5" stroke-linecap="round"/>
                <!-- Body parts -->
                <circle id="y-head" cx="140" cy="58"  r="18" stroke="var(--red)" stroke-width="2.5" fill="none"      style="display:none"/>
                <line   id="y-body" x1="140" y1="76"  x2="140" y2="136" stroke="var(--red)" stroke-width="2.5"        style="display:none"/>
                <line   id="y-larm" x1="140" y1="92"  x2="108" y2="116" stroke="var(--red)" stroke-width="2.5"        style="display:none"/>
                <line   id="y-rarm" x1="140" y1="92"  x2="172" y2="116" stroke="var(--red)" stroke-width="2.5"        style="display:none"/>
                <line   id="y-lleg" x1="140" y1="136" x2="108" y2="174" stroke="var(--red)" stroke-width="2.5"        style="display:none"/>
                <line   id="y-rleg" x1="140" y1="136" x2="172" y2="174" stroke="var(--red)" stroke-width="2.5"        style="display:none"/>
            </svg>

            <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
                <div class="lives-row" id="lives-row">
                    <div class="life-dot"></div>
                    <div class="life-dot"></div>
                    <div class="life-dot"></div>
                    <div class="life-dot"></div>
                    <div class="life-dot"></div>
                    <div class="life-dot"></div>
                </div>
                <span class="error-label" id="error-label">0 de 6 erros</span>
            </div>
        </div>

        <!-- Right: word + hint + keyboard -->
        <div class="word-side">
            <div class="word-row" id="your-word"></div>

            <div class="hint-area">
                <button id="hint-btn">Usar dica</button>
                <span class="hint-sub" id="hint-sub">1 dica disponivel</span>
            </div>

            <div class="keyboard" id="keyboard">
                <div class="key-row" id="row-1"></div>
                <div class="key-row" id="row-2"></div>
                <div class="key-row" id="row-3"></div>
            </div>
        </div>

    </div>

    <!-- Opponent full panel -->
    <div id="opp-panel">
        <div class="opp-panel-header">
            <span class="opp-panel-label">Progresso do Oponente</span>
            <div class="opp-panel-lives" id="opp-panel-lives"></div>
            <span class="opp-panel-err" id="opp-panel-err"></span>
        </div>
        <div class="opp-word-row" id="opp-word-row"></div>
        <div class="opp-letters-section">
            <div class="opp-letter-group">
                <span class="opp-letter-group-label">Acertos</span>
                <div class="opp-chips" id="opp-chips-hit"></div>
            </div>
            <div class="opp-letter-group">
                <span class="opp-letter-group-label">Erros</span>
                <div class="opp-chips" id="opp-chips-miss"></div>
            </div>
        </div>
    </div>
</div>

<!-- End overlay -->
<div id="end-overlay">
    <div class="end-card">
        <div id="end-result"></div>
        <div id="end-title"></div>
        <div id="end-word"></div>
        <button id="play-again-btn" onclick="location.reload()">Jogar Novamente</button>
    </div>
</div>

<script>
    const Y_PARTS = ['y-head','y-body','y-larm','y-rarm','y-lleg','y-rleg'];
    const QWERTY  = [
        ['Q','W','E','R','T','Y','U','I','O','P'],
        ['A','S','D','F','G','H','J','K','L'],
        ['Z','X','C','V','B','N','M'],
    ];

    let gameWord  = '';
    let gameOver  = false;
    let socket    = null;

    const urlParams    = new URLSearchParams(window.location.search);
    const serversParam = urlParams.get('servers');
    const SERVER_LIST  = serversParam
        ? serversParam.split(',').map(s => s.trim())
        : [window.location.origin];

    let serverIndex = 0;
    let playerId    = localStorage.getItem('hangman_player_id') || '';

    // Build keyboard
    QWERTY.forEach((row, i) => {
        const el = document.getElementById('row-' + (i + 1));
        row.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.id = 'key-' + letter;
            btn.textContent = letter;
            btn.addEventListener('click', () => sendGuess(letter));
            el.appendChild(btn);
        });
    });

    // ---------------------------------------------------------------------------
    // Connection
    // ---------------------------------------------------------------------------

    function connectToServer() {
        const url = SERVER_LIST[serverIndex];
        setStatus('Conectando...');
        if (socket) { socket.off(); socket.disconnect(); }

        socket = io(url, { query: { player_id: playerId }, reconnection: false, timeout: 5000 });

        socket.on('connect', () => {
            setStatus('Online' + (SERVER_LIST.length > 1 ? ' · srv ' + (serverIndex+1) + '/' + SERVER_LIST.length : ''));
        });
        socket.on('disconnect', () => { if (!gameOver) { setStatus('Reconectando...'); switchServer(); } });
        socket.on('connect_error', () => switchServer());

        socket.on('connected', ({ player_id }) => {
            playerId = player_id;
            localStorage.setItem('hangman_player_id', player_id);
            setStatus('Online · ' + player_id.substring(0, 8) + (SERVER_LIST.length > 1 ? ' · srv ' + (serverIndex+1) + '/' + SERVER_LIST.length : ''));
        });

        socket.on('waiting', ({ position }) => {
            document.getElementById('waiting-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display    = 'none';
            document.getElementById('queue-pos').textContent = 'Posicao na fila: ' + position;
        });

        socket.on('game_state', handleGameState);
    }

    function switchServer() {
        if (gameOver) return;
        serverIndex = (serverIndex + 1) % SERVER_LIST.length;
        setTimeout(connectToServer, 1500);
    }

    function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

    // ---------------------------------------------------------------------------
    // Rendering
    // ---------------------------------------------------------------------------

    function updateHangman(count) {
        Y_PARTS.forEach((id, i) => {
            document.getElementById(id).style.display = i < count ? '' : 'none';
        });
    }

    function updateLives(count) {
        const dots = document.querySelectorAll('.life-dot');
        dots.forEach((d, i) => d.classList.toggle('lost', i < count));
        document.getElementById('error-label').textContent = count + ' de 6 erros';
    }

    function renderWord(containerId, wordState, revealed) {
        const el = document.getElementById(containerId);
        const letters = wordState.split(' ');
        // reuse existing slots if count matches
        if (el.children.length !== letters.length) {
            el.innerHTML = '';
            letters.forEach(() => {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                const ch   = document.createElement('div');
                ch.className = 'letter-char';
                const line = document.createElement('div');
                line.className = 'letter-line';
                slot.appendChild(ch);
                slot.appendChild(line);
                el.appendChild(slot);
            });
        }
        letters.forEach((l, i) => {
            const ch = el.children[i].querySelector('.letter-char');
            if (l !== '_') {
                ch.textContent = l;
                ch.classList.add('show');
            } else {
                ch.textContent = '';
                ch.classList.remove('show');
            }
        });
    }

    function updateKeyboard(guessed, word) {
        guessed.forEach(l => {
            const btn = document.getElementById('key-' + l);
            if (!btn) return;
            btn.classList.remove('hit','miss');
            btn.classList.add(word.includes(l) ? 'hit' : 'miss');
            btn.disabled = true;
        });
    }

    function renderOppPanel(state) {
        const panel = document.getElementById('opp-panel');
        panel.style.display = 'block';

        // Lives
        const livesEl = document.getElementById('opp-panel-lives');
        livesEl.innerHTML = '';
        const wrong = state.opponent_wrong || 0;
        for (let i = 0; i < 6; i++) {
            const d = document.createElement('div');
            d.className = 'opp-panel-life' + (i < wrong ? ' lost' : '');
            livesEl.appendChild(d);
        }
        document.getElementById('opp-panel-err').textContent = wrong + ' de 6 erros';

        // Word slots
        const wordRow = document.getElementById('opp-word-row');
        const letters = (state.opponent_word_state || '').split(' ');
        if (wordRow.children.length !== letters.length) {
            wordRow.innerHTML = '';
            letters.forEach(() => {
                const slot = document.createElement('div');
                slot.className = 'opp-letter-slot';
                const ch   = document.createElement('div');
                ch.className = 'opp-letter-char';
                const line = document.createElement('div');
                line.className = 'opp-letter-line';
                slot.appendChild(ch);
                slot.appendChild(line);
                wordRow.appendChild(slot);
            });
        }
        letters.forEach((l, i) => {
            const ch = wordRow.children[i].querySelector('.opp-letter-char');
            if (l !== '_') { ch.textContent = l; ch.classList.add('show'); }
            else            { ch.textContent = ''; ch.classList.remove('show'); }
        });

        // Chips — split guessed into hits/misses
        // We need the word to classify; use gameWord if available
        const knownWord = gameWord || '';
        const guessed   = state.opponent_guessed || [];
        const hitChips  = document.getElementById('opp-chips-hit');
        const missChips = document.getElementById('opp-chips-miss');
        hitChips.innerHTML  = '';
        missChips.innerHTML = '';
        guessed.forEach(l => {
            const chip = document.createElement('span');
            chip.className = 'opp-chip';
            chip.textContent = l;
            if (knownWord && knownWord.includes(l)) {
                chip.classList.add('hit');
                hitChips.appendChild(chip);
            } else if (knownWord) {
                chip.classList.add('miss');
                missChips.appendChild(chip);
            } else {
                // word unknown yet — show in hit section neutral
                chip.classList.add('hit');
                hitChips.appendChild(chip);
            }
        });
    }

    function updateOppTopbar(wrongCount, wordState) {
        const bar = document.getElementById('opp-topbar');
        bar.style.display = 'flex';

        // lives
        const livesEl = document.getElementById('opp-lives-top');
        livesEl.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const d = document.createElement('div');
            d.className = 'opp-life' + (i < wrongCount ? ' lost' : '');
            livesEl.appendChild(d);
        }

        // word
        document.getElementById('opp-word-top').textContent =
            wordState.replace(/ /g, ' ').replace(/_/g, '·');
    }

    function handleGameState(state) {
        if (gameOver) return;

        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('game-screen').style.display    = 'block';

        if (state.full_word) gameWord = state.full_word;
        const word = gameWord || state.word_state.replace(/ /g, '');

        // Your state
        renderWord('your-word', state.word_state, word);
        updateHangman(state.wrong_count);
        updateLives(state.wrong_count);
        updateKeyboard(state.guessed || [], word);

        // Hint button
        const hintBtn = document.getElementById('hint-btn');
        const hintSub = document.getElementById('hint-sub');
        if (state.hint_used) {
            hintBtn.disabled = true;
            hintSub.textContent = 'Dica ja utilizada';
        }

        // Opponent topbar + full panel
        if (state.opponent_word_state !== undefined) {
            updateOppTopbar(state.opponent_wrong, state.opponent_word_state);
            renderOppPanel(state);
        }

        // Opponent strip
        const strip = document.getElementById('opp-status-strip');
        strip.style.display = 'none';
        strip.className = '';
        if (state.opponent_status === 'disconnected') {
            strip.style.display = 'block';
            strip.className = 'disconnected';
            strip.textContent = 'Oponente desconectado — 30 segundos para reconectar';
        } else if (state.opponent_status === 'won') {
            strip.style.display = 'block';
            strip.className = 'won';
            strip.textContent = 'Oponente completou a palavra';
        } else if (state.opponent_status === 'lost') {
            strip.style.display = 'block';
            strip.className = 'lost';
            strip.textContent = 'Oponente foi enforcado';
        }

        // Game over
        if (state.status === 'won' || state.status === 'lost') {
            gameOver = true;
            localStorage.removeItem('hangman_player_id');
            document.querySelectorAll('.key').forEach(k => k.disabled = true);
            hintBtn.disabled = true;

            const overlay = document.getElementById('end-overlay');
            overlay.classList.add('show');

            const result = document.getElementById('end-result');
            const title  = document.getElementById('end-title');

            if (state.status === 'won') {
                result.style.color = 'var(--green)';
                result.textContent = 'Vitoria';
                title.style.color  = 'var(--text)';
                title.textContent  = 'Voce venceu!';
            } else {
                result.style.color = 'var(--red)';
                result.textContent = 'Derrota';
                title.style.color  = 'var(--text)';
                title.textContent  = 'Voce perdeu.';
            }

            if (state.full_word) {
                document.getElementById('end-word').textContent = 'A palavra era  ' + state.full_word;
            }
        }
    }

    // ---------------------------------------------------------------------------
    // Input
    // ---------------------------------------------------------------------------

    function sendGuess(letter) {
        if (!socket || gameOver) return;
        socket.emit('guess', { letter });
    }

    document.getElementById('hint-btn').addEventListener('click', () => {
        if (!socket || gameOver) return;
        socket.emit('hint');
    });

    // Physical keyboard support
    document.addEventListener('keydown', e => {
        if (gameOver) return;
        const letter = e.key.toUpperCase();
        if (/^[A-Z]$/.test(letter)) sendGuess(letter);
    });

    connectToServer();
</script>

</body>
</html>
