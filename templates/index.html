<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:    #ff4365;
            --purple: #9b59ff;
            --green:  #2ecc71;
            --bg:     #0d0d1a;
            --card:   #13132b;
            --border: #1e1e40;
            --text:   #e0e0f0;
            --muted:  #555580;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 8px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
        }

        header p {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Status bar */
        #status-bar {
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 28px;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
        }

        /* ===================== WAITING SCREEN ===================== */
        #waiting-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 60px;
        }

        .waiting-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,67,101,0.15), rgba(155,89,255,0.15));
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .waiting-icon::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--red);
            border-right-color: var(--purple);
            animation: spin 1.2s linear infinite;
        }

        .waiting-icon svg { width: 36px; height: 36px; opacity: 0.6; }

        @keyframes spin { to { transform: rotate(360deg); } }

        #waiting-screen h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }

        #queue-pos {
            font-size: 0.85rem;
            color: var(--muted);
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
        }

        .waiting-dots span {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            margin: 0 3px;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
        .waiting-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* ===================== GAME SCREEN ===================== */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 980px;
        }

        .game-panels {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Panel */
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 20px;
            flex: 1;
            min-width: 300px;
            max-width: 460px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 20px 20px 0 0;
        }

        .panel.you::before      { background: var(--red); }
        .panel.opponent::before { background: var(--purple); }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .panel-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .panel.you .panel-label    { color: var(--red); }
        .panel.opponent .panel-label { color: var(--purple); }

        .error-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .panel.you .error-badge    { background: rgba(255,67,101,0.15); color: var(--red); }
        .panel.opponent .error-badge { background: rgba(155,89,255,0.15); color: var(--purple); }

        /* Hangman SVG */
        .hangman-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .hangman-svg { width: 150px; height: 170px; }

        /* Word */
        .word-display {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            min-height: 48px;
        }

        .letter-box {
            width: 36px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 900;
            border-bottom: 2px solid #333;
            transition: all 0.3s;
        }

        .letter-box.revealed {
            color: #fff;
            border-bottom-color: var(--red);
            animation: pop 0.3s ease;
        }

        .panel.opponent .letter-box.revealed { border-bottom-color: var(--purple); }

        @keyframes pop {
            0% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .panel.opponent .letter-box { width: 28px; height: 36px; font-size: 1.1rem; }

        /* Guessed letters */
        .guessed-section {
            margin-bottom: 14px;
        }

        .guessed-title {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .guessed-letters {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 28px;
        }

        .chip {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .chip.hit  { background: rgba(46,204,113,0.2); color: var(--green); border: 1px solid rgba(46,204,113,0.4); }
        .chip.miss { background: rgba(255,67,101,0.15); color: #ff6b6b; border: 1px solid rgba(255,67,101,0.3); }

        /* Input */
        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        #letter-input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
        }

        #letter-input:focus { border-color: var(--red); }
        #letter-input:disabled { opacity: 0.3; }

        #guess-btn {
            padding: 12px 20px;
            background: var(--red);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 1px;
        }

        #guess-btn:hover    { opacity: 0.9; transform: translateY(-1px); }
        #guess-btn:active   { transform: translateY(0); }
        #guess-btn:disabled { background: #333; cursor: not-allowed; transform: none; }

        /* Opponent badge */
        .opp-badge {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
        }

        .opp-badge.disconnected { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
        .opp-badge.won          { background: rgba(46,204,113,0.1); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
        .opp-badge.lost         { background: rgba(255,67,101,0.1); color: var(--red); border: 1px solid rgba(255,67,101,0.3); }

        /* Divider */
        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 900;
            color: var(--muted);
            padding: 0 4px;
            align-self: center;
        }

        /* End overlay */
        #end-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #end-overlay.show { display: flex; }

        .end-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .end-card .trophy {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        #end-title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        #end-word {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 32px;
        }

        #play-again-btn {
            padding: 14px 36px;
            background: var(--red);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 1px;
        }

        #play-again-btn:hover  { opacity: 0.9; transform: translateY(-2px); }
        #play-again-btn:active { transform: translateY(0); }

        @media (max-width: 680px) {
            header h1 { font-size: 1.4rem; }
            .panel { min-width: 280px; padding: 18px 14px; }
            .vs-divider { display: none; }
        }
    </style>
</head>
<body>

<header>
    <h1>Jogo da Forca</h1>
    <p>MODO CORRIDA — 2 JOGADORES</p>
</header>
<div id="status-bar">Conectando...</div>

<!-- Waiting -->
<div id="waiting-screen">
    <div class="waiting-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
    </div>
    <h2>Aguardando Oponente</h2>
    <div id="queue-pos">Procurando adversario...</div>
    <div class="waiting-dots">
        <span></span><span></span><span></span>
    </div>
</div>

<!-- Game -->
<div id="game-screen">
    <div class="game-panels">

        <!-- Your panel -->
        <div class="panel you">
            <div class="panel-header">
                <span class="panel-label">Voce</span>
                <span class="error-badge" id="your-error-badge">0 / 6 erros</span>
            </div>
            <div class="hangman-wrap">
                <svg class="hangman-svg" id="your-hangman" viewBox="0 0 160 170">
                    <line x1="5"   y1="163" x2="155" y2="163" stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <line x1="35"  y1="163" x2="35"  y2="6"   stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <line x1="35"  y1="6"   x2="110" y2="6"   stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <line x1="110" y1="6"   x2="110" y2="30"  stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <circle id="y-head" cx="110" cy="44"  r="14" stroke="var(--red)" stroke-width="2.5" fill="none" style="display:none"/>
                    <line   id="y-body" x1="110" y1="58"  x2="110" y2="106"  stroke="var(--red)" stroke-width="2.5" style="display:none"/>
                    <line   id="y-larm" x1="110" y1="72"  x2="82"  y2="94"   stroke="var(--red)" stroke-width="2.5" style="display:none"/>
                    <line   id="y-rarm" x1="110" y1="72"  x2="138" y2="94"   stroke="var(--red)" stroke-width="2.5" style="display:none"/>
                    <line   id="y-lleg" x1="110" y1="106" x2="82"  y2="138"  stroke="var(--red)" stroke-width="2.5" style="display:none"/>
                    <line   id="y-rleg" x1="110" y1="106" x2="138" y2="138"  stroke="var(--red)" stroke-width="2.5" style="display:none"/>
                </svg>
            </div>
            <div class="word-display" id="your-word"></div>
            <div class="guessed-section">
                <div class="guessed-title">Letras tentadas</div>
                <div class="guessed-letters" id="your-guessed"></div>
            </div>
            <div class="input-area">
                <input type="text" id="letter-input" maxlength="1" placeholder="A — Z" autocomplete="off" spellcheck="false"/>
                <button id="guess-btn">ENVIAR</button>
            </div>
        </div>

        <div class="vs-divider">VS</div>

        <!-- Opponent panel -->
        <div class="panel opponent">
            <div class="panel-header">
                <span class="panel-label">Oponente</span>
                <span class="error-badge" id="opp-error-badge">0 / 6 erros</span>
            </div>
            <div id="opp-badge-wrap"></div>
            <div class="hangman-wrap">
                <svg class="hangman-svg" id="opp-hangman" viewBox="0 0 160 170">
                    <line x1="5"   y1="163" x2="155" y2="163" stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <line x1="35"  y1="163" x2="35"  y2="6"   stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <line x1="35"  y1="6"   x2="110" y2="6"   stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <line x1="110" y1="6"   x2="110" y2="30"  stroke="#2a2a4a" stroke-width="4" stroke-linecap="round"/>
                    <circle id="o-head" cx="110" cy="44"  r="14" stroke="var(--purple)" stroke-width="2.5" fill="none" style="display:none"/>
                    <line   id="o-body" x1="110" y1="58"  x2="110" y2="106"  stroke="var(--purple)" stroke-width="2.5" style="display:none"/>
                    <line   id="o-larm" x1="110" y1="72"  x2="82"  y2="94"   stroke="var(--purple)" stroke-width="2.5" style="display:none"/>
                    <line   id="o-rarm" x1="110" y1="72"  x2="138" y2="94"   stroke="var(--purple)" stroke-width="2.5" style="display:none"/>
                    <line   id="o-lleg" x1="110" y1="106" x2="82"  y2="138"  stroke="var(--purple)" stroke-width="2.5" style="display:none"/>
                    <line   id="o-rleg" x1="110" y1="106" x2="138" y2="138"  stroke="var(--purple)" stroke-width="2.5" style="display:none"/>
                </svg>
            </div>
            <div class="word-display" id="opp-word"></div>
            <div class="guessed-section">
                <div class="guessed-title">Letras tentadas</div>
                <div class="guessed-letters" id="opp-guessed"></div>
            </div>
        </div>

    </div>
</div>

<!-- End overlay -->
<div id="end-overlay">
    <div class="end-card">
        <div class="trophy" id="end-trophy"></div>
        <div id="end-title"></div>
        <div id="end-word"></div>
        <button id="play-again-btn" onclick="location.reload()">JOGAR NOVAMENTE</button>
    </div>
</div>

<script>
    const Y_PARTS = ['y-head', 'y-body', 'y-larm', 'y-rarm', 'y-lleg', 'y-rleg'];
    const O_PARTS = ['o-head', 'o-body', 'o-larm', 'o-rarm', 'o-lleg', 'o-rleg'];

    let gameWord = '';
    let gameOver = false;
    let socket = null;

    const urlParams = new URLSearchParams(window.location.search);
    const serversParam = urlParams.get('servers');
    const SERVER_LIST = serversParam
        ? serversParam.split(',').map(s => s.trim())
        : [window.location.origin];

    let serverIndex = 0;
    let playerId = localStorage.getItem('hangman_player_id') || '';

    // ---------------------------------------------------------------------------
    // Conexao e failover
    // ---------------------------------------------------------------------------

    function connectToServer() {
        const url = SERVER_LIST[serverIndex];
        setStatus('Conectando...');

        if (socket) { socket.off(); socket.disconnect(); }

        socket = io(url, {
            query: { player_id: playerId },
            reconnection: false,
            timeout: 5000,
        });

        socket.on('connect', () => {
            const label = SERVER_LIST.length > 1
                ? ' · servidor ' + (serverIndex + 1) + '/' + SERVER_LIST.length
                : '';
            setStatus('Conectado' + label);
        });

        socket.on('disconnect', reason => {
            if (gameOver) return;
            setStatus('Reconectando...');
            switchServer();
        });

        socket.on('connect_error', () => {
            switchServer();
        });

        socket.on('connected', ({ player_id }) => {
            playerId = player_id;
            localStorage.setItem('hangman_player_id', player_id);
            const label = SERVER_LIST.length > 1
                ? ' · servidor ' + (serverIndex + 1) + '/' + SERVER_LIST.length
                : '';
            setStatus('Online · ' + player_id.substring(0, 8) + label);
        });

        socket.on('waiting', ({ position }) => {
            document.getElementById('waiting-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('queue-pos').textContent =
                'Posicao na fila: ' + position;
        });

        socket.on('game_state', handleGameState);
    }

    function switchServer() {
        if (gameOver) return;
        serverIndex = (serverIndex + 1) % SERVER_LIST.length;
        setTimeout(connectToServer, 1500);
    }

    function setStatus(msg) {
        document.getElementById('status-bar').textContent = msg;
    }

    // ---------------------------------------------------------------------------
    // Renderizacao
    // ---------------------------------------------------------------------------

    function updateHangman(parts, count) {
        parts.forEach((id, i) => {
            document.getElementById(id).style.display = i < count ? '' : 'none';
        });
    }

    function renderWord(containerId, wordState, fullWord) {
        const el = document.getElementById(containerId);
        el.innerHTML = '';
        const letters = wordState.split(' ');
        letters.forEach(l => {
            const box = document.createElement('div');
            box.className = 'letter-box' + (l !== '_' ? ' revealed' : '');
            box.textContent = l !== '_' ? l : '';
            el.appendChild(box);
        });
    }

    function renderGuessed(containerId, letters, word) {
        const el = document.getElementById(containerId);
        el.innerHTML = '';
        letters.forEach(l => {
            const span = document.createElement('span');
            span.className = 'chip ' + (word.includes(l) ? 'hit' : 'miss');
            span.textContent = l;
            el.appendChild(span);
        });
    }

    function handleGameState(state) {
        if (gameOver) return;

        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';

        if (state.full_word) gameWord = state.full_word;
        const word = gameWord || state.word_state.replace(/ /g, '');

        // Seu painel
        renderWord('your-word', state.word_state, word);
        document.getElementById('your-error-badge').textContent = state.wrong_count + ' / 6 erros';
        updateHangman(Y_PARTS, state.wrong_count);
        renderGuessed('your-guessed', state.guessed || [], word);

        // Painel do oponente
        if (state.opponent_word_state !== undefined) {
            renderWord('opp-word', state.opponent_word_state, gameWord || '');
            document.getElementById('opp-error-badge').textContent = state.opponent_wrong + ' / 6 erros';
            updateHangman(O_PARTS, state.opponent_wrong);
            renderGuessed('opp-guessed', state.opponent_guessed || [], gameWord || '');
        }

        // Badge oponente
        const wrap = document.getElementById('opp-badge-wrap');
        wrap.innerHTML = '';
        if (state.opponent_status === 'disconnected') {
            wrap.innerHTML = '<div class="opp-badge disconnected">Oponente desconectado — 30s para reconectar</div>';
        } else if (state.opponent_status === 'won') {
            wrap.innerHTML = '<div class="opp-badge won">Oponente venceu!</div>';
        } else if (state.opponent_status === 'lost') {
            wrap.innerHTML = '<div class="opp-badge lost">Oponente perdeu!</div>';
        }

        // Fim de jogo
        if (state.status === 'won' || state.status === 'lost') {
            gameOver = true;
            localStorage.removeItem('hangman_player_id');
            document.getElementById('guess-btn').disabled = true;
            document.getElementById('letter-input').disabled = true;

            const overlay  = document.getElementById('end-overlay');
            const title    = document.getElementById('end-title');
            const trophy   = document.getElementById('end-trophy');

            overlay.classList.add('show');

            if (state.status === 'won') {
                trophy.textContent = 'W';
                title.style.color = 'var(--green)';
                title.textContent = 'VOCE VENCEU!';
            } else {
                trophy.textContent = 'L';
                title.style.color = 'var(--red)';
                title.textContent = 'VOCE PERDEU!';
            }

            if (state.full_word) {
                document.getElementById('end-word').textContent = 'A palavra era: ' + state.full_word;
            }
        }
    }

    // ---------------------------------------------------------------------------
    // Input
    // ---------------------------------------------------------------------------

    function sendGuess() {
        if (!socket) return;
        const input = document.getElementById('letter-input');
        const letter = input.value.trim().toUpperCase();
        if (letter && /^[A-Z]$/.test(letter)) {
            socket.emit('guess', { letter });
        }
        input.value = '';
        input.focus();
    }

    document.getElementById('guess-btn').addEventListener('click', sendGuess);
    document.getElementById('letter-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendGuess();
    });
    document.getElementById('letter-input').addEventListener('input', e => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
    });

    connectToServer();
</script>

</body>
</html>
