<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forca — Modo Corrida</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #f2f2f8;
            --surface: #ffffff;
            --card:    #ffffff;
            --border:  #dcdce8;
            --text:    #0f0f26;
            --muted:   #c4c4d8;
            --dim:     #8888b0;
            --red:     #e03232;
            --green:   #00a85e;
            --yellow:  #cc8800;
            --blue:    #2f6ee0;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── TOP BAR ── */
        #top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text);
        }

        #conn-status {
            font-size: 0.63rem;
            color: var(--dim);
            letter-spacing: 0.5px;
        }

        /* ── WAITING ── */
        #waiting-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }

        .wait-ring {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 2px solid var(--border);
            border-top-color: var(--red);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .wait-title {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .wait-pos {
            font-size: 0.72rem;
            color: var(--dim);
        }

        /* ── GAME SCREEN ── */
        #game-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        /* Alert strip */
        #alert-strip {
            display: none;
            padding: 5px 24px;
            font-size: 0.68rem;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid transparent;
            flex-shrink: 0;
        }
        #alert-strip.disc     { color: var(--yellow); background: rgba(255,190,48,0.07); border-color: rgba(255,190,48,0.18); }
        #alert-strip.opp-won  { color: var(--green);  background: rgba(0,216,124,0.07);  border-color: rgba(0,216,124,0.18); }
        #alert-strip.opp-lost { color: var(--red);    background: rgba(255,59,59,0.07);   border-color: rgba(255,59,59,0.18); }

        /* ── ARENA ── */
        .arena {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── PLAYER SIDES ── */
        .player-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 20px 14px;
            gap: 10px;
            overflow: hidden;
            min-width: 0;
        }

        /* Side header */
        .side-header {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .side-label {
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .side-label.you { color: var(--red); }
        .side-label.opp { color: var(--blue); }

        .err-dots {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }

        .err-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid var(--muted);
            background: transparent;
            transition: background 0.25s, border-color 0.25s;
        }

        .err-dot.on-you  { background: var(--red);  border-color: var(--red); }
        .err-dot.on-opp  { background: var(--blue); border-color: var(--blue); }

        /* Hangman */
        .hangman-wrap { flex-shrink: 0; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .hg-part { animation: fadeIn 0.2s ease; }

        /* Word row */
        .word-row {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .letter-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .letter-char {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            opacity: 0;
            transform: translateY(5px) scale(0.85);
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .letter-char.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .letter-line { background: var(--muted); }

        /* You — big */
        .you-word .letter-char { width: 32px; height: 42px; font-size: 1.45rem; color: var(--text); }
        .you-word .letter-line { width: 32px; height: 2px; }

        /* Opp — smaller, blue tint */
        .opp-word .letter-char { width: 24px; height: 32px; font-size: 1.05rem; color: var(--blue); }
        .opp-word .letter-line { width: 24px; height: 2px; }

        /* Side status badge */
        .side-status {
            display: none;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .side-status.show { display: block; }
        .side-status.won  { color: var(--green); background: rgba(0,216,124,0.1); border: 1px solid rgba(0,216,124,0.25); }
        .side-status.lost { color: var(--red);   background: rgba(255,59,59,0.1);  border: 1px solid rgba(255,59,59,0.25); }

        /* Hint */
        .hint-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        #hint-btn {
            padding: 7px 20px;
            background: transparent;
            border: 1px solid var(--yellow);
            border-radius: 6px;
            color: var(--yellow);
            font-family: 'Inter', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

        #hint-btn:hover:not(:disabled) { background: rgba(255,190,48,0.1); }

        #hint-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            border-color: var(--muted);
            color: var(--dim);
        }

        .hint-sub { font-size: 0.6rem; color: var(--dim); letter-spacing: 1px; }

        /* Opp chips */
        .chips-area { width: 100%; }

        .chips-label {
            font-size: 0.56rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--dim);
            margin-bottom: 7px;
        }

        .chips-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 28px;
        }

        .chip {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 700;
        }

        .chip.hit  { background: rgba(0,216,124,0.14); color: var(--green); border: 1px solid rgba(0,216,124,0.3); }
        .chip.miss { background: transparent; color: var(--muted); border: 1px solid var(--border); text-decoration: line-through; }

        /* ── VS DIVIDER ── */
        .vs-divider {
            width: 1px;
            background: var(--border);
            position: relative;
            flex-shrink: 0;
        }

        .vs-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 10px;
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--dim);
        }

        /* ── KEYBOARD ── */
        #keyboard-area {
            border-top: 1px solid var(--border);
            background: var(--surface);
            padding: 10px 16px 8px;
            flex-shrink: 0;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .key-row:last-child { margin-bottom: 0; }

        .key {
            width: 38px;
            height: 44px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s, color 0.1s, transform 0.08s, border-color 0.1s, opacity 0.15s;
        }

        .key:hover:not(:disabled) {
            background: #e8e8f4;
            border-color: var(--dim);
            transform: translateY(-1px);
        }

        .key:active:not(:disabled) { transform: translateY(0); }

        .key.hit {
            background: rgba(0,216,124,0.1);
            border-color: rgba(0,216,124,0.4);
            color: var(--green);
            cursor: default;
        }

        .key.miss {
            opacity: 0.25;
            cursor: default;
            text-decoration: line-through;
        }

        .key:disabled { cursor: default; }

        /* Shake */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-7px); }
            40%     { transform: translateX(7px); }
            60%     { transform: translateX(-4px); }
            80%     { transform: translateX(4px); }
        }

        .shake { animation: shake 0.32s ease; }

        /* ── END OVERLAY ── */
        #end-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        #end-overlay.show { display: flex; }

        .end-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 56px 48px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.82); }
            to   { opacity: 1; transform: scale(1); }
        }

        .end-badge {
            display: inline-block;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .end-badge.won  { color: var(--green); background: rgba(0,216,124,0.1);  border: 1px solid rgba(0,216,124,0.28); }
        .end-badge.lost { color: var(--red);   background: rgba(255,59,59,0.1);   border: 1px solid rgba(255,59,59,0.28); }

        #end-title {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 10px;
        }

        #end-word {
            font-size: 0.78rem;
            color: var(--dim);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        #play-again-btn {
            padding: 13px 36px;
            background: var(--red);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }

        #play-again-btn:hover  { opacity: 0.86; transform: translateY(-1px); }
        #play-again-btn:active { transform: translateY(0); }

        /* ── RESPONSIVE ── */
        @media (max-width: 620px) {
            body { overflow: auto; }
            #game-screen { overflow: auto; }
            .arena { flex-direction: column; overflow: visible; }
            .vs-divider { width: 100%; height: 1px; }
            .vs-badge { top: 0; left: 50%; transform: translate(-50%, -50%); }
            .player-side { padding: 14px 16px; }
            .key { width: 30px; height: 38px; font-size: 0.72rem; }
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div id="top-bar">
    <span class="logo">Forca</span>
    <span id="conn-status">Conectando...</span>
</div>

<!-- Waiting -->
<div id="waiting-screen">
    <div class="wait-ring"></div>
    <span class="wait-title">Aguardando oponente</span>
    <span class="wait-pos" id="queue-pos">Procurando adversario...</span>
</div>

<!-- Game -->
<div id="game-screen">

    <div id="alert-strip"></div>

    <div class="arena">

        <!-- YOUR SIDE -->
        <div class="player-side">

            <div class="side-header">
                <span class="side-label you">Voce</span>
                <div class="err-dots" id="your-err-dots"></div>
            </div>

            <div class="hangman-wrap">
                <svg id="your-hg" width="170" height="190" viewBox="0 0 200 220">
                    <line x1="10"  y1="212" x2="190" y2="212" stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <line x1="50"  y1="212" x2="50"  y2="10"  stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <line x1="50"  y1="10"  x2="140" y2="10"  stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <line x1="140" y1="10"  x2="140" y2="38"  stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <circle id="y-head" cx="140" cy="56"  r="18" stroke="var(--red)" stroke-width="2.5" fill="none"    class="hg-part" style="display:none"/>
                    <line   id="y-body" x1="140" y1="74"  x2="140" y2="134"     stroke="var(--red)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="y-larm" x1="140" y1="92"  x2="108" y2="116"     stroke="var(--red)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="y-rarm" x1="140" y1="92"  x2="172" y2="116"     stroke="var(--red)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="y-lleg" x1="140" y1="134" x2="108" y2="172"     stroke="var(--red)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="y-rleg" x1="140" y1="134" x2="172" y2="172"     stroke="var(--red)" stroke-width="2.5" class="hg-part" style="display:none"/>
                </svg>
            </div>

            <div class="word-row you-word" id="your-word"></div>

            <div class="side-status" id="your-status-badge"></div>

            <div class="hint-wrap">
                <button id="hint-btn">Usar dica</button>
                <span class="hint-sub" id="hint-sub">1 dica disponivel</span>
            </div>

        </div>

        <!-- VS -->
        <div class="vs-divider"><div class="vs-badge">VS</div></div>

        <!-- OPPONENT SIDE -->
        <div class="player-side">

            <div class="side-header">
                <span class="side-label opp">Oponente</span>
                <div class="err-dots" id="opp-err-dots"></div>
            </div>

            <div class="hangman-wrap">
                <svg id="opp-hg" width="136" height="152" viewBox="0 0 200 220">
                    <line x1="10"  y1="212" x2="190" y2="212" stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <line x1="50"  y1="212" x2="50"  y2="10"  stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <line x1="50"  y1="10"  x2="140" y2="10"  stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <line x1="140" y1="10"  x2="140" y2="38"  stroke="#d0d0e4" stroke-width="5" stroke-linecap="round"/>
                    <circle id="o-head" cx="140" cy="56"  r="18" stroke="var(--blue)" stroke-width="2.5" fill="none"    class="hg-part" style="display:none"/>
                    <line   id="o-body" x1="140" y1="74"  x2="140" y2="134"     stroke="var(--blue)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="o-larm" x1="140" y1="92"  x2="108" y2="116"     stroke="var(--blue)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="o-rarm" x1="140" y1="92"  x2="172" y2="116"     stroke="var(--blue)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="o-lleg" x1="140" y1="134" x2="108" y2="172"     stroke="var(--blue)" stroke-width="2.5" class="hg-part" style="display:none"/>
                    <line   id="o-rleg" x1="140" y1="134" x2="172" y2="172"     stroke="var(--blue)" stroke-width="2.5" class="hg-part" style="display:none"/>
                </svg>
            </div>

            <div class="word-row opp-word" id="opp-word"></div>

            <div class="side-status" id="opp-status-badge"></div>

            <div class="chips-area">
                <div class="chips-label">Letras tentadas</div>
                <div class="chips-row" id="opp-chips"></div>
            </div>

        </div>

    </div>

    <!-- Keyboard -->
    <div id="keyboard-area">
        <div class="key-row" id="row-1"></div>
        <div class="key-row" id="row-2"></div>
        <div class="key-row" id="row-3"></div>
    </div>

</div>

<!-- End overlay -->
<div id="end-overlay">
    <div class="end-card">
        <div class="end-badge" id="end-badge"></div>
        <div id="end-title"></div>
        <div id="end-word"></div>
        <button id="play-again-btn" onclick="location.reload()">Jogar Novamente</button>
    </div>
</div>

<script>
    const Y_PARTS = ['y-head','y-body','y-larm','y-rarm','y-lleg','y-rleg'];
    const O_PARTS = ['o-head','o-body','o-larm','o-rarm','o-lleg','o-rleg'];
    const QWERTY  = [
        ['Q','W','E','R','T','Y','U','I','O','P'],
        ['A','S','D','F','G','H','J','K','L'],
        ['Z','X','C','V','B','N','M'],
    ];

    let gameWord    = '';
    let prevWrong   = 0;
    let isFirstState = true;
    let gameOver    = false;
    let socket      = null;

    const urlParams    = new URLSearchParams(window.location.search);
    const serversParam = urlParams.get('servers');
    const SERVER_LIST  = serversParam
        ? serversParam.split(',').map(s => s.trim())
        : [window.location.origin];

    let serverIndex = 0;
    let playerId    = localStorage.getItem('hangman_player_id') || '';

    // Build error dots
    function buildDots(id) {
        const el = document.getElementById(id);
        for (let i = 0; i < 6; i++) {
            const d = document.createElement('div');
            d.className = 'err-dot';
            el.appendChild(d);
        }
    }
    buildDots('your-err-dots');
    buildDots('opp-err-dots');

    // Build keyboard
    QWERTY.forEach((row, i) => {
        const el = document.getElementById('row-' + (i + 1));
        row.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.id = 'key-' + letter;
            btn.textContent = letter;
            btn.addEventListener('click', () => sendGuess(letter));
            el.appendChild(btn);
        });
    });

    // ── Connection ──────────────────────────────────────────────────────────

    function connectToServer() {
        const url = SERVER_LIST[serverIndex];
        setStatus('Conectando...');
        if (socket) { socket.off(); socket.disconnect(); }

        socket = io(url, { query: { player_id: playerId }, reconnection: false, timeout: 5000 });

        socket.on('connect', () => {
            setStatus('Online' + (SERVER_LIST.length > 1 ? ' · srv ' + (serverIndex + 1) + '/' + SERVER_LIST.length : ''));
        });
        socket.on('disconnect',    () => { if (!gameOver) { setStatus('Reconectando...'); switchServer(); } });
        socket.on('connect_error', () => switchServer());

        socket.on('connected', ({ player_id }) => {
            playerId = player_id;
            localStorage.setItem('hangman_player_id', player_id);
        });

        socket.on('waiting', ({ position }) => {
            document.getElementById('waiting-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display    = 'none';
            document.getElementById('queue-pos').textContent = 'Posicao na fila: ' + position;
        });

        socket.on('game_state', handleGameState);
    }

    function switchServer() {
        if (gameOver) return;
        serverIndex = (serverIndex + 1) % SERVER_LIST.length;
        setTimeout(connectToServer, 1500);
    }

    function setStatus(msg) { document.getElementById('conn-status').textContent = msg; }

    // ── Rendering ───────────────────────────────────────────────────────────

    function updateHangman(parts, count, doShake) {
        parts.forEach((id, i) => {
            document.getElementById(id).style.display = i < count ? '' : 'none';
        });
        if (doShake) {
            const svgId = parts[0].startsWith('y') ? 'your-hg' : 'opp-hg';
            const svg = document.getElementById(svgId);
            svg.classList.remove('shake');
            void svg.offsetWidth;
            svg.classList.add('shake');
            svg.addEventListener('animationend', () => svg.classList.remove('shake'), { once: true });
        }
    }

    function updateDots(id, count, dotClass) {
        const dots = document.getElementById(id).querySelectorAll('.err-dot');
        dots.forEach((d, i) => {
            d.classList.remove('on-you', 'on-opp');
            if (i < count) d.classList.add(dotClass);
        });
    }

    function renderWord(containerId, wordState) {
        const el = document.getElementById(containerId);
        const letters = wordState.split(' ');
        if (el.children.length !== letters.length) {
            el.innerHTML = '';
            letters.forEach(() => {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                const ch   = document.createElement('div');
                ch.className = 'letter-char';
                const line = document.createElement('div');
                line.className = 'letter-line';
                slot.appendChild(ch);
                slot.appendChild(line);
                el.appendChild(slot);
            });
        }
        letters.forEach((l, i) => {
            const ch = el.children[i].querySelector('.letter-char');
            if (l !== '_') { ch.textContent = l; ch.classList.add('show'); }
            else            { ch.textContent = ''; ch.classList.remove('show'); }
        });
    }

    function updateKeyboard(guessed, word) {
        guessed.forEach(l => {
            const btn = document.getElementById('key-' + l);
            if (!btn) return;
            btn.classList.remove('hit', 'miss');
            btn.classList.add(word && word.includes(l) ? 'hit' : 'miss');
            btn.disabled = true;
        });
    }

    function updateOppChips(guessed, oppWordState) {
        const container = document.getElementById('opp-chips');
        container.innerHTML = '';
        const revealed = new Set((oppWordState || '').split(' ').filter(l => l !== '_'));
        guessed.forEach(l => {
            const chip = document.createElement('span');
            chip.className = 'chip ' + (revealed.has(l) ? 'hit' : 'miss');
            chip.textContent = l;
            container.appendChild(chip);
        });
    }

    function showSideStatus(elId, status) {
        const el = document.getElementById(elId);
        el.className = 'side-status';
        if (status === 'won')  { el.classList.add('show', 'won');  el.textContent = 'Venceu'; }
        if (status === 'lost') { el.classList.add('show', 'lost'); el.textContent = 'Perdeu'; }
    }

    function handleGameState(state) {
        if (gameOver) return;

        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('game-screen').style.display    = 'flex';

        if (state.full_word) gameWord = state.full_word;

        const wrongNow = state.wrong_count || 0;
        const doShake  = !isFirstState && wrongNow > prevWrong;
        prevWrong    = wrongNow;
        isFirstState = false;

        // Your side
        renderWord('your-word', state.word_state);
        updateHangman(Y_PARTS, wrongNow, doShake);
        updateDots('your-err-dots', wrongNow, 'on-you');
        updateKeyboard(state.guessed || [], gameWord);

        // Hint
        const hintBtn = document.getElementById('hint-btn');
        const hintSub = document.getElementById('hint-sub');
        if (state.hint_used) { hintBtn.disabled = true; hintSub.textContent = 'Dica utilizada'; }

        // Opponent side
        if (state.opponent_word_state !== undefined) {
            renderWord('opp-word', state.opponent_word_state);
            updateHangman(O_PARTS, state.opponent_wrong || 0, false);
            updateDots('opp-err-dots', state.opponent_wrong || 0, 'on-opp');
            updateOppChips(state.opponent_guessed || [], state.opponent_word_state);
        }

        // Alert strip
        const strip = document.getElementById('alert-strip');
        strip.style.display = 'none';
        strip.className = '';
        if (state.opponent_status === 'disconnected') {
            strip.style.display = 'block';
            strip.className = 'disc';
            strip.textContent = 'Oponente desconectou — 30 segundos para reconectar';
        }

        // Side status badges
        if (state.status === 'won')  showSideStatus('your-status-badge', 'won');
        if (state.status === 'lost') showSideStatus('your-status-badge', 'lost');
        if (state.opponent_status === 'won')  showSideStatus('opp-status-badge', 'won');
        if (state.opponent_status === 'lost') showSideStatus('opp-status-badge', 'lost');

        // Game over
        if (state.status === 'won' || state.status === 'lost') {
            gameOver = true;
            localStorage.removeItem('hangman_player_id');
            document.querySelectorAll('.key').forEach(k => k.disabled = true);
            hintBtn.disabled = true;

            const overlay = document.getElementById('end-overlay');
            overlay.classList.add('show');

            const badge = document.getElementById('end-badge');
            const title = document.getElementById('end-title');

            if (state.status === 'won') {
                badge.className = 'end-badge won';
                badge.textContent = 'Vitoria';
                title.textContent = 'Voce venceu!';
            } else {
                badge.className = 'end-badge lost';
                badge.textContent = 'Derrota';
                title.textContent = 'Voce perdeu.';
            }

            if (state.full_word) {
                document.getElementById('end-word').textContent = 'A palavra era  ' + state.full_word;
            }
        }
    }

    // ── Input ───────────────────────────────────────────────────────────────

    function sendGuess(letter) {
        if (!socket || gameOver) return;
        socket.emit('guess', { letter });
    }

    document.getElementById('hint-btn').addEventListener('click', () => {
        if (!socket || gameOver) return;
        socket.emit('hint');
    });

    document.addEventListener('keydown', e => {
        if (gameOver) return;
        const l = e.key.toUpperCase();
        if (/^[A-Z]$/.test(l)) sendGuess(l);
    });

    connectToServer();
</script>
</body>
</html>
